# AI Elegance — Nginx reverse proxy (HTTP). After DNS works:
#   sudo cp /path/to/nginx-aielegance-site.conf /etc/nginx/sites-available/aielegance
#   sudo ln -sf /etc/nginx/sites-available/aielegance /etc/nginx/sites-enabled/aielegance
#   sudo rm -f /etc/nginx/sites-enabled/default   # optional: avoid default_server clash
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot install --nginx  (or: certbot --nginx -d aielegance.com -d www.aielegance.com)
#
# Requires: PocketBase on 127.0.0.1:8090, Nuxt on 127.0.0.1:3000

server {
    listen 80;
    listen [::]:80;
    server_name aielegance.com www.aielegance.com;

    location /pb/ {
        proxy_pass http://127.0.0.1:8090/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Long LLM / image jobs (default nginx 60s causes 504 on slow models)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
